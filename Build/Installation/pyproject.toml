[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gasd-parser"
version = "1.1.1"
description = "Official GASD 1.1 Parser and Validator"
authors = [
    { name = "GASD Team" }
]
readme = "README.md"
dependencies = [
    "antlr4-python3-runtime==4.13.2"
]
requires-python = ">=3.8"

[project.scripts]
gasd-parser = "gasd_parser.cli:main"
